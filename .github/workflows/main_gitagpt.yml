# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions
name: Build and deploy Python app to Azure Web App - GitaGPT

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt -t python_packages

      - name: Prepare deployment package
        run: |
          rm -rf deploy deploy.zip
          mkdir -p deploy/backend/data
          cp -R backend/app deploy/backend/
          cp -R backend/data/index deploy/backend/data/
          cp -R backend/data/processed deploy/backend/data/
          cp startup.sh deploy/
          cp -R python_packages deploy/
          find deploy -type d -name '__pycache__' -prune -exec rm -rf {} +
          find deploy -type f -name '*.pyc' -delete
          find deploy -type f -name '.DS_Store' -delete
          chmod +x deploy/startup.sh

      - name: Archive deployment package
        run: |
          cd deploy
          zip -r ../deploy.zip .
          cd ..

      - name: Validate deployment archive
        run: |
          test -f deploy.zip
          unzip -l deploy.zip | grep -E 'startup\.sh|backend/app/main\.py|backend/data/index/faiss\.index|backend/data/index/metadata\.json' >/dev/null
          unzip -p deploy.zip startup.sh | grep -F "python -m uvicorn" >/dev/null
          echo "Archive size:"
          ls -lh deploy.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy.zip
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package
          path: .

      - name: Inspect downloaded files
        run: |
          echo "Working directory: $(pwd)"
          ls -lah
          find . -maxdepth 4 -type f -name 'deploy.zip' -print
          ZIP_PATH="$(find . -maxdepth 4 -type f -name 'deploy.zip' | head -n 1)"
          test -n "$ZIP_PATH"
          unzip -p "$ZIP_PATH" startup.sh | sed -n '1,20p'

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'GitaGPT'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DCB88AD507594729B1E75C90483346A8 }}
          package: '**/deploy.zip'
